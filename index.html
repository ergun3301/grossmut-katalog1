<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grossmut Afiş</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#eceff1;
}

/* ŞİFRE */
#login{
  position:fixed;
  inset:0;
  background:#111;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#login input{
  padding:12px;
  font-size:18px;
  border:none;
  border-radius:8px;
  text-align:center;
}
#login button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:green;
  color:#fff;
  font-weight:bold;
}

/* PANEL */
.panel{
  background:#fff;
  padding:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  position:sticky;
  top:0;
  z-index:20;
}
.panel input{
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
}
.panel button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
.btnEkle{background:orange;color:#fff}
.btnKaydet{background:green;color:#fff}
.btnPdf{background:#555;color:#fff}
.btnTemizle{background:#c62828;color:#fff}

/* A4 AFİŞ */
#afis{
  width:794px;
  height:1123px;
  margin:10px auto;
  background:#fff;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}

/* ÜST ALAN */
.header{
  height:170px;
  display:grid;
  grid-template-columns:1.45fr 0.55fr 0.55fr;
  gap:10px;
  align-items:center;
  padding:12px 16px;
}

.logo{
  font-size:68px;
  font-weight:900;
  font-style:italic;
  line-height:.9;
  letter-spacing:-3px;
  white-space:nowrap;
}

.g1{color:#1ca42f}
.g2{color:#f5a300}

.altBaslik{
  margin-top:8px;
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  font-size:24px;
  font-weight:900;
  text-transform:uppercase;
}

/* TARİH */
.tarih{
  background:#49a63a;
  color:#fff;
  border-radius:18px;
  padding:8px;
  width:150px;
  text-align:center;
}
.tarih span{
  display:block;
  font-size:12px;
  font-weight:900;
  margin-bottom:5px;
}
.tarih input{
  width:100%;
  border:none;
  outline:none;
  border-radius:8px;
  padding:5px;
  text-align:center;
  font-size:13px;
  font-weight:900;
  background:#fff;
  color:#111;
}

/* QR */
.qr{
  text-align:center;
}
.qr img{
  width:125px;
  height:125px;
  object-fit:contain;
}
.qr .kul{
  font-size:14px;
  font-weight:900;
}
.qr .takip{
  font-size:11px;
  color:#555;
}

/* ÇİZGİ */
.cizgi{
  height:5px;
  background:#1ca42f;
}

/* ÜRÜN GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(4,1fr);
  height:890px;
}

/* KART */
.card{
  border:1px solid #ddd;
  padding:5px;
  display:flex;
  flex-direction:column;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.silBtn{
  position:absolute;
  top:4px;
  right:4px;
  width:22px;
  height:22px;
  border:none;
  border-radius:50%;
  background:red;
  color:#fff;
  font-size:12px;
  cursor:pointer;
  z-index:5;
}

.imgSilBtn{
  position:absolute;
  top:4px;
  left:4px;
  border:none;
  border-radius:8px;
  background:#666;
  color:#fff;
  font-size:10px;
  padding:3px 6px;
  cursor:pointer;
  z-index:5;
}

.imgBox{
  height:90px;
  margin-top:22px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.imgBox img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.urunAdi{
  min-height:28px;
  font-size:14px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
  text-transform:uppercase;
  cursor:pointer;
}

.aciklama{
  min-height:18px;
  font-size:10px;
  color:#666;
  display:flex;
  align-items:center;
  justify-content:center;
  text-transform:uppercase;
}

.eski{
  min-height:18px;
  color:red;
  text-decoration:line-through;
  font-size:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.yeni{
  min-height:30px;
  color:green;
  font-size:26px;
  font-weight:900;
  display:flex;
  align-items:center;
  justify-content:center;
}

.indirim{
  margin-top:auto;
  background:gold;
  padding:5px;
  font-size:13px;
  font-weight:900;
}

/* PDF ALIRKEN BUTONLAR GİZLENSİN */
.pdfMod .silBtn,
.pdfMod .imgSilBtn{
  display:none!important;
}

@media print{
  .panel,#login,.silBtn,.imgSilBtn{
    display:none!important;
  }
}
</style>
</head>

<body>

<div id="login">
  <h2>Şifre</h2>
  <input type="password" id="sifre" placeholder="Şifre">
  <button onclick="giris()">Giriş</button>
</div>

<div class="panel">
  <input id="urunAdiInput" placeholder="Ürün adı">
  <input id="aciklamaInput" placeholder="Açıklama">
  <input id="eskiInput" type="number" inputmode="numeric" placeholder="Eski fiyat">
  <input id="yeniInput" type="number" inputmode="numeric" placeholder="Yeni fiyat">
  <input type="file" id="resimInput" accept="image/*">

  <button class="btnEkle" onclick="urunEkle()">Ekle</button>
  <button class="btnKaydet" onclick="kaydet()">Kaydet</button>
  <button class="btnPdf" onclick="pdfOlustur()">PDF</button>
  <button class="btnTemizle" onclick="tumunuTemizle()">Temizle</button>
</div>

<div id="afis">

  <div class="header">
    <div>
      <div class="logo">
        <span class="g1">GRO</span><span class="g2">S</span><span class="g1">S</span><span class="g2">MUT</span>
      </div>
      <input id="baslikInput" class="altBaslik" value="HAFTANIN YILDIZLARI">
    </div>

    <div class="tarih">
      <span>GEÇERLİLİK</span>
      <input id="tarihInput" type="text" value="21 - 24 NİSAN">
    </div>

    <div class="qr">
      <img src="IMG_8553.jpeg" alt="Instagram QR">
      <div class="kul">@grossmut33</div>
      <div class="takip">Bizi takip edin</div>
    </div>
  </div>

  <div class="cizgi"></div>

  <div class="grid" id="grid"></div>

</div>

<script>
const KAYIT = "grossmut_urunler_son";
const AYAR = "grossmut_ayarlar_son";

let urunler = [];
let resim = "";
let duzenlenenIndex = null;

function giris(){
  if(sifre.value === "7433"){
    login.style.display = "none";
  }else{
    alert("Yanlış şifre");
  }
}

function kaydet(){
  localStorage.setItem(KAYIT, JSON.stringify(urunler));
  localStorage.setItem(AYAR, JSON.stringify({
    baslik: baslikInput.value,
    tarih: tarihInput.value
  }));
  alert("Kaydedildi");
}

function yukle(){
  const u = localStorage.getItem(KAYIT);
  if(u) urunler = JSON.parse(u) || [];

  const a = localStorage.getItem(AYAR);
  if(a){
    const ayar = JSON.parse(a);
    baslikInput.value = ayar.baslik || "HAFTANIN YILDIZLARI";
    tarihInput.value = ayar.tarih || "21 - 24 NİSAN";
  }
}

resimInput.onchange = e => {
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = x => resim = x.target.result;
  reader.readAsDataURL(file);
};

eskiInput.oninput = function(){
  this.value = this.value.replace(/[^0-9]/g,"");
};
yeniInput.oninput = function(){
  this.value = this.value.replace(/[^0-9]/g,"");
};

baslikInput.oninput = kaydetSessiz;
tarihInput.oninput = kaydetSessiz;

function kaydetSessiz(){
  localStorage.setItem(AYAR, JSON.stringify({
    baslik: baslikInput.value,
    tarih: tarihInput.value
  }));
}

function urunEkle(){
  const data = {
    ad: urunAdiInput.value,
    aciklama: aciklamaInput.value,
    eski: eskiInput.value.replace(/[^0-9]/g,""),
    yeni: yeniInput.value.replace(/[^0-9]/g,""),
    resim: resim
  };

  if(duzenlenenIndex !== null){
    urunler[duzenlenenIndex] = {
      ...urunler[duzenlenenIndex],
      ...data,
      resim: resim || urunler[duzenlenenIndex].resim
    };
    duzenlenenIndex = null;
  }else{
    if(urunler.length >= 12) return alert("En fazla 12 ürün eklenir.");
    urunler.push(data);
  }

  urunAdiInput.value = "";
  aciklamaInput.value = "";
  eskiInput.value = "";
  yeniInput.value = "";
  resimInput.value = "";
  resim = "";

  localStorage.setItem(KAYIT, JSON.stringify(urunler));
  ciz();
}

function sil(i){
  urunler.splice(i,1);
  localStorage.setItem(KAYIT, JSON.stringify(urunler));
  ciz();
}

function resimSil(i){
  urunler[i].resim = "";
  localStorage.setItem(KAYIT, JSON.stringify(urunler));
  ciz();
}

function duzenle(i){
  const u = urunler[i];
  if(!u) return;

  urunAdiInput.value = u.ad || "";
  aciklamaInput.value = u.aciklama || "";
  eskiInput.value = u.eski || "";
  yeniInput.value = u.yeni || "";
  resim = "";
  resimInput.value = "";
  duzenlenenIndex = i;
}

function tumunuTemizle(){
  if(!confirm("Tüm ürünler silinsin mi?")) return;
  urunler = [];
  localStorage.removeItem(KAYIT);
  ciz();
}

function ciz(){
  let html = "";
  for(let i=0;i<12;i++){
    const u = urunler[i] || {};
    html += `
      <div class="card">
        ${u.ad ? `<button class="silBtn" onclick="sil(${i})">X</button>` : ""}
        ${u.resim ? `<button class="imgSilBtn" onclick="resimSil(${i})">Resim Sil</button>` : ""}
        <div class="imgBox">${u.resim ? `<img src="${u.resim}">` : ""}</div>
        <div class="urunAdi" onclick="duzenle(${i})">${u.ad || ""}</div>
        <div class="aciklama">${u.aciklama || ""}</div>
        <div class="eski">${u.eski || ""}</div>
        <div class="yeni">${u.yeni || ""}</div>
        <div class="indirim">İNDİRİM</div>
      </div>
    `;
  }
  grid.innerHTML = html;
}

function pdfOlustur(){
  const element = document.getElementById("afis");

  element.classList.add("pdfMod");

  const opt = {
    margin: 0,
    filename: "Grossmut-Afis.pdf",
    image: { type: "jpeg", quality: 1 },
    html2canvas: {
      scale: 2,
      useCORS: true,
      scrollX: 0,
      scrollY: 0,
      width: 794,
      height: 1123,
      windowWidth: 794,
      windowHeight: 1123
    },
    jsPDF: {
      unit: "px",
      format: [794,1123],
      orientation: "portrait"
    },
    pagebreak: { mode: ["avoid-all"] }
  };

  html2pdf()
    .set(opt)
    .from(element)
    .save()
    .then(() => {
      element.classList.remove("pdfMod");
    });
}

yukle();
ciz();
</script>

</body>
</html>
