<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Grossmut</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eceff1}

/* LOGIN */
#login{
position:fixed;inset:0;background:#111;color:#fff;
display:flex;align-items:center;justify-content:center;flex-direction:column
}
#login input{padding:10px;border:none;border-radius:6px;text-align:center}
#login button{margin-top:10px;padding:8px 16px;background:green;color:#fff;border:none;border-radius:6px}

/* PANEL */
.panel{background:#fff;padding:10px;display:flex;gap:6px;flex-wrap:wrap}
.panel input{padding:6px;border:1px solid #ccc;border-radius:6px}
.panel button{padding:6px 10px;border:none;border-radius:6px;font-weight:bold}

/* A4 */
#afis{width:794px;height:1123px;margin:auto;background:#fff}

/* HEADER */
.header{
display:grid;
grid-template-columns:1.5fr 0.4fr 0.4fr;
align-items:center;
padding:10px;
}

/* LOGO */
.logo{font-size:68px;font-weight:900;font-style:italic}
.g1{color:#1ca42f}
.g2{color:#f5a300}

/* BAŞLIK */
.altBaslik{
font-size:22px;font-weight:900;border:none;background:transparent
}

/* 🔥 TARİH SÜPER SIKI */
.tarih{
background:#49a63a;
color:#fff;
border-radius:12px;
padding:4px;
width:90px;
text-align:center;
}

.tarih span{font-size:10px;font-weight:bold}

.tarihSatir{
display:flex;
justify-content:center;
align-items:center;
gap:1px;
}

.tarih input{
width:22px;
height:18px;
border:none;
border-radius:4px;
text-align:center;
font-size:10px;
font-weight:bold;
}

.ay{
width:50px!important;
margin-top:2px;
}

/* QR */
.qr img{width:110px;height:110px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(4,1fr);
height:880px;
}

/* CARD */
.card{
border:1px solid #ddd;
padding:4px;
text-align:center;
display:flex;
flex-direction:column;
}

.imgBox{height:90px}
.imgBox img{width:100%;height:100%;object-fit:contain}

.urunAdi{font-size:13px;font-weight:bold}
.aciklama{font-size:10px;color:#666}
.eski{color:red;text-decoration:line-through}
.yeni{color:green;font-size:24px;font-weight:bold}

.indirim{background:gold;margin-top:auto;padding:4px}

/* PRINT */
@media print{.panel,#login{display:none}}
</style>
</head>

<body>

<div id="login">
<input type="password" id="sifre">
<button onclick="giris()">Giriş</button>
</div>

<div class="panel">
<input id="urunAdiInput" placeholder="Ürün">
<input id="aciklamaInput" placeholder="Açıklama">
<input id="eskiInput" type="number">
<input id="yeniInput" type="number">
<input type="file" id="resimInput">
<button onclick="urunEkle()">Ekle</button>
<button onclick="kaydet()">Kaydet</button>
<button onclick="window.print()">PDF</button>
</div>

<div id="afis">

<div class="header">

<div>
<div class="logo">
<span class="g1">GRO</span><span class="g2">S</span><span class="g1">S</span><span class="g2">MUT</span>
</div>
<input id="baslikInput" class="altBaslik" value="HAFTANIN YILDIZLARI">
</div>

<div class="tarih">
<span>GEÇERLİ</span>
<div class="tarihSatir">
<input id="basGun" type="number" value="21">-
<input id="bitGun" type="number" value="24">
</div>
<input id="ayInput" class="ay" value="NİSAN">
</div>

<div class="qr">
<img src="IMG_8553.jpeg">
</div>

</div>

<div class="grid" id="grid"></div>

</div>

<script>
let urunler=[],resim="";

function giris(){
if(sifre.value==="7433") login.style.display="none";
}

function kaydet(){
localStorage.setItem("urunler",JSON.stringify(urunler));
localStorage.setItem("baslik",baslikInput.value);
localStorage.setItem("tarih",JSON.stringify({
b:basGun.value, s:bitGun.value, a:ayInput.value
}));
alert("Kaydedildi");
}

function yukle(){
let u=localStorage.getItem("urunler");
if(u) urunler=JSON.parse(u);

let t=localStorage.getItem("tarih");
if(t){
t=JSON.parse(t);
basGun.value=t.b;bitGun.value=t.s;ayInput.value=t.a;
}
baslikInput.value=localStorage.getItem("baslik")||"HAFTANIN YILDIZLARI";
}

resimInput.onchange=e=>{
let r=new FileReader();
r.onload=x=>resim=x.target.result;
r.readAsDataURL(e.target.files[0]);
};

eskiInput.oninput=yeniInput.oninput=function(){
this.value=this.value.replace(/[^0-9]/g,'')
};

function urunEkle(){
urunler.push({
ad:urunAdiInput.value,
aciklama:aciklamaInput.value,
eski:eskiInput.value,
yeni:yeniInput.value,
resim:resim
});
ciz();
}

function ciz(){
let html="";
for(let i=0;i<12;i++){
let u=urunler[i]||{};
html+=`
<div class="card">
<div class="imgBox">${u.resim?`<img src="${u.resim}">`:``}</div>
<div class="urunAdi">${u.ad||""}</div>
<div class="aciklama">${u.aciklama||""}</div>
<div class="eski">${u.eski||""}</div>
<div class="yeni">${u.yeni||""}</div>
<div class="indirim">İNDİRİM</div>
</div>`;
}
grid.innerHTML=html;
}

yukle();
ciz();
</script>

</body>
</html>
