<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grossmut Afiş</title>

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background:#eceff1}

/* LOGIN */
#login{
position:fixed;inset:0;background:#111;color:#fff;
display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999
}
#login input{padding:12px;font-size:18px;border-radius:8px;text-align:center;border:none;width:240px}
#login button{margin-top:10px;padding:10px 20px;background:green;color:#fff;border:none;border-radius:8px;font-weight:bold;cursor:pointer}

/* PANEL */
.panel{
background:#fff;padding:10px;display:flex;flex-wrap:wrap;gap:8px;
position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.08)
}
.panel input{padding:8px;border-radius:6px;border:1px solid #ccc}
.panel button{padding:8px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
.btnEkle{background:orange;color:#fff}
.btnPdf{background:#666;color:#fff}
.btnTemizle{background:#c62828;color:#fff}
.btnResimSil{background:#777;color:#fff}

/* A4 */
#afis{
width:794px;height:1123px;margin:10px auto;background:#fff;overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,.12)
}

/* HEADER */
.header{
display:grid;grid-template-columns:1.5fr 0.7fr 0.5fr;gap:10px;padding:10px
}
.logoSatir{font-size:70px;font-weight:900;font-style:italic;letter-spacing:-3px;line-height:.9}
.g1{color:#1ca42f}
.g2{color:#f5a300}
.g3{color:#f5a300}

/* BAŞLIK */
.altBaslik{
margin-top:6px;font-size:24px;font-weight:900;text-transform:uppercase;
border:none;background:transparent;outline:none;width:100%
}

/* TARİH */
.tarihKutu{
background:#49a63a;color:#fff;border-radius:30px;padding:12px;text-align:center;
display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:128px
}
.tarihSatir{display:flex;justify-content:center;gap:8px}
.tarihInputKucuk{width:56px;height:38px;border:none;border-radius:10px;background:#fff;text-align:center;font-weight:900}
.tarihInputAy{width:120px;height:38px;border:none;border-radius:10px;background:#fff;text-align:center;font-weight:900;margin-top:8px}

/* QR */
.qr img{
width:140px;
height:140px;
object-fit:contain;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(4,1fr);
height:860px;
}

/* CARD */
.card{
border:1px solid #ddd;
padding:5px;
display:flex;
flex-direction:column;
position:relative;
text-align:center;
}

.silBtn{
position:absolute;top:5px;right:5px;background:red;color:#fff;
border:none;border-radius:50%;width:22px;height:22px;cursor:pointer
}
.imgSilBtn{
position:absolute;top:5px;left:5px;background:#666;color:#fff;
border:none;border-radius:8px;font-size:10px;padding:2px 6px;cursor:pointer
}

/* 🔥 RESİM BÜYÜTÜLDÜ */
.imgBox{
height:90px;
margin-top:22px;
}
.imgBox img{
width:100%;
height:100%;
object-fit:contain;
}

/* TEXT */
.urunAdi{font-size:14px;font-weight:bold}
.aciklama{font-size:10px;color:#666}
.eski{color:red;text-decoration:line-through;font-size:14px}
.yeni{color:green;font-size:26px;font-weight:bold}
.indirim{background:gold;padding:5px;margin-top:auto}

/* PRINT */
@media print{
.panel,#login{display:none}
.silBtn,.imgSilBtn{display:none}
@page{size:A4;margin:0}
}
</style>
</head>

<body>

<div id="login">
<h2>Şifre</h2>
<input type="password" id="sifre">
<button onclick="giris()">Giriş</button>
</div>

<div class="panel">
<input id="urunAdiInput" placeholder="Ürün">
<input id="aciklamaInput" placeholder="Açıklama">
<input id="eskiInput" type="number">
<input id="yeniInput" type="number">
<input type="file" id="resimInput">
<button class="btnEkle" onclick="urunEkle()">Ekle</button>
<button class="btnResimSil" onclick="seciliResmiTemizle()">Resim Sil</button>
<button class="btnPdf" onclick="window.print()">PDF</button>
<button class="btnTemizle" onclick="tumunuTemizle()">Temizle</button>
</div>

<div id="afis">

<div class="header">
<div>
<div class="logoSatir">
<span class="g1">GRO</span><span class="g2">S</span><span class="g1">S</span><span class="g3">MUT</span>
</div>
<input id="baslikInput" class="altBaslik" value="HAFTANIN YILDIZLARI">
</div>

<div class="tarihKutu">
<div>GEÇERLİLİK</div>
<div class="tarihSatir">
<input id="basGun" type="number" value="21">
-
<input id="bitGun" type="number" value="24">
</div>
<input id="ayInput" value="NİSAN">
</div>

<div class="qr">
<img src="IMG_8553.jpeg">
</div>
</div>

<div class="grid" id="grid"></div>

</div>

<script>
const KAYIT="katalog_v3";
const AYAR="ayar_v3";

let urunler=[],resim="",duzenlenenIndex=null;

function giris(){
if(sifre.value==="7433"){
login.style.display="none";
}else alert("Yanlış şifre");
}

function kaydet(){
localStorage.setItem(KAYIT,JSON.stringify(urunler));
localStorage.setItem(AYAR,JSON.stringify({
baslik:baslikInput.value,
basGun:basGun.value,
bitGun:bitGun.value,
ay:ayInput.value
}));
}

function yukle(){
let u=localStorage.getItem(KAYIT);
if(u) urunler=JSON.parse(u)||[];

let a=localStorage.getItem(AYAR);
if(a){
a=JSON.parse(a);
baslikInput.value=a.baslik||"HAFTANIN YILDIZLARI";
basGun.value=a.basGun||"21";
bitGun.value=a.bitGun||"24";
ayInput.value=a.ay||"NİSAN";
}
}

resimInput.onchange=e=>{
let f=e.target.files[0];
let r=new FileReader();
r.onload=x=>resim=x.target.result;
r.readAsDataURL(f);
};

function seciliResmiTemizle(){resim="";resimInput.value=""}

eskiInput.oninput=yeniInput.oninput=function(){
this.value=this.value.replace(/[^0-9]/g,'')
};

baslikInput.oninput=basGun.oninput=bitGun.oninput=ayInput.oninput=function(){
kaydet();
};

function urunEkle(){
let data={
ad:urunAdiInput.value,
aciklama:aciklamaInput.value,
eski:eskiInput.value,
yeni:yeniInput.value,
resim:resim
};

if(duzenlenenIndex!=null){
urunler[duzenlenenIndex]=data;
duzenlenenIndex=null;
}else{
if(urunler.length>=12)return;
urunler.push(data);
}

urunAdiInput.value="";
aciklamaInput.value="";
eskiInput.value="";
yeniInput.value="";
resim="";

kaydet();
ciz();
}

function sil(i){urunler.splice(i,1);kaydet();ciz();}
function resimSil(i){urunler[i].resim="";kaydet();ciz();}

function duzenle(i){
let u=urunler[i];
urunAdiInput.value=u.ad;
aciklamaInput.value=u.aciklama;
eskiInput.value=u.eski;
yeniInput.value=u.yeni;
duzenlenenIndex=i;
}

function tumunuTemizle(){
urunler=[];localStorage.removeItem(KAYIT);ciz();
}

function ciz(){
let html="";
for(let i=0;i<12;i++){
let u=urunler[i]||{};
html+=`
<div class="card">
${u.ad?`<button class="silBtn" onclick="sil(${i})">X</button>`:""}
${u.resim?`<button class="imgSilBtn" onclick="resimSil(${i})">Resim Sil</button>`:""}
<div class="imgBox">${u.resim?`<img src="${u.resim}">`:``}</div>
<div class="urunAdi" onclick="duzenle(${i})">${u.ad||""}</div>
<div class="aciklama">${u.aciklama||""}</div>
<div class="eski">${u.eski||""}</div>
<div class="yeni">${u.yeni||""}</div>
<div class="indirim">İNDİRİM</div>
</div>`;
}
grid.innerHTML=html;
}

yukle();
ciz();
</script>

</body>
</html>
