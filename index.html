<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grossmut Afiş</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eceff1}

/* LOGIN */
#login{
position:fixed;inset:0;background:#111;color:#fff;
display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999
}
#login input{padding:12px;font-size:18px;border-radius:8px;text-align:center}
#login button{margin-top:10px;padding:10px 20px;background:green;color:#fff;border:none;border-radius:8px}

/* PANEL */
.panel{
background:#fff;padding:10px;display:flex;flex-wrap:wrap;gap:8px;position:sticky;top:0
}
.panel input{padding:8px;border-radius:6px;border:1px solid #ccc}

/* A4 */
#afis{
width:794px;height:1123px;margin:auto;background:#fff;overflow:hidden
}

/* HEADER */
.header{
display:grid;grid-template-columns:1.5fr 0.7fr 0.5fr;padding:10px
}
.logoSatir{font-size:70px;font-weight:900;font-style:italic}
.g1{color:#1ca42f}
.g2{color:#f5a300}
.g3{color:#f5a300}

/* TARİH */
.tarihKutu{
background:#49a63a;color:#fff;border-radius:30px;padding:10px;text-align:center
}
.tarihSatir{display:flex;justify-content:center;gap:8px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(4,1fr);
height:760px;
}

.card{
border:1px solid #ddd;
padding:5px;
display:flex;
flex-direction:column;
position:relative;
text-align:center;
}

/* SİL BUTONU */
.silBtn{
position:absolute;
top:5px;
right:5px;
background:red;
color:#fff;
border:none;
border-radius:50%;
width:22px;
height:22px;
cursor:pointer;
font-size:12px;
}

/* RESİM */
.imgBox{height:300px}
.imgBox img{width:100%;height:100%;object-fit:cover}

/* TEXT */
.urunAdi{font-size:13px;font-weight:bold;cursor:pointer}
.eski{color:red;text-decoration:line-through;font-size:13px}
.yeni{color:green;font-size:24px;font-weight:bold}
.indirim{background:gold;padding:5px;margin-top:auto}

/* PRINT */
@media print{
.panel,#login{display:none}
.silBtn{display:none}
@page{size:A4;margin:0}
}
</style>
</head>

<body>

<div id="login">
<h2>Şifre</h2>
<input type="password" id="sifre">
<button onclick="giris()">Giriş</button>
</div>

<div class="panel">
<input id="urunAdiInput" placeholder="Ürün">
<input id="eskiInput" type="number">
<input id="yeniInput" type="number">
<input type="file" id="resimInput">
<button onclick="urunEkle()">Ekle</button>
<button onclick="window.print()">PDF</button>
</div>

<div id="afis">

<div class="header">
<div class="logoSatir">
<span class="g1">GRO</span><span class="g2">S</span><span class="g1">S</span><span class="g3">MUT</span>
</div>

<div class="tarihKutu">
<div>GEÇERLİLİK</div>
<div class="tarihSatir">
<input id="basGun" type="number" value="21">
-
<input id="bitGun" type="number" value="24">
</div>
<input id="ayInput" value="NİSAN">
</div>

<div class="qr">
<img src="IMG_8553.jpeg" width="100">
</div>
</div>

<div class="grid" id="grid"></div>

</div>

<script>
let urunler=[],resim="",duzenlenenIndex=null;

/* ŞİFRE */
function giris(){
if(document.getElementById("sifre").value==="7433"){
login.style.display="none";
}else alert("Yanlış şifre");
}

/* RESİM */
resimInput.onchange=e=>{
let f=e.target.files[0];
let r=new FileReader();
r.onload=x=>resim=x.target.result;
r.readAsDataURL(f);
};

/* SADECE SAYI */
eskiInput.oninput=function(){this.value=this.value.replace(/[^0-9]/g,'')}
yeniInput.oninput=function(){this.value=this.value.replace(/[^0-9]/g,'')}

/* EKLE / GÜNCELLE */
function urunEkle(){

if(duzenlenenIndex!==null){
urunler[duzenlenenIndex]={
ad:urunAdiInput.value,
eski:eskiInput.value,
yeni:yeniInput.value,
resim:resim || urunler[duzenlenenIndex].resim
};
duzenlenenIndex=null;
}else{
if(urunler.length>=12)return;
urunler.push({
ad:urunAdiInput.value,
eski:eskiInput.value,
yeni:yeniInput.value,
resim:resim
});
}

urunAdiInput.value="";
eskiInput.value="";
yeniInput.value="";
resim="";
ciz();
}

/* SİL */
function sil(i){
urunler.splice(i,1);
ciz();
}

/* DÜZENLE */
function duzenle(i){
let u=urunler[i];
urunAdiInput.value=u.ad;
eskiInput.value=u.eski;
yeniInput.value=u.yeni;
duzenlenenIndex=i;
}

/* ÇİZ */
function ciz(){
let html="";
for(let i=0;i<12;i++){
let u=urunler[i]||{};
html+=`
<div class="card">
${u.ad?`<button class="silBtn" onclick="sil(${i})">X</button>`:""}
<div class="imgBox">${u.resim?`<img src="${u.resim}">`:``}</div>
<div class="urunAdi" onclick="duzenle(${i})">${u.ad||""}</div>
<div class="eski">${u.eski||""}</div>
<div class="yeni">${u.yeni||""}</div>
<div class="indirim">İNDİRİM</div>
</div>`;
}
grid.innerHTML=html;
}

ciz();
</script>

</body>
</html>
