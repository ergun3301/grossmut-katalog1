<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grossmut Afiş</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eceff1}

/* LOGIN */
#login{
position:fixed;inset:0;background:#111;color:#fff;
display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999
}

/* SETTINGS */
#ayarBtn{
position:fixed;top:10px;right:10px;width:42px;height:42px;border-radius:50%;background:#fff;z-index:1000;cursor:pointer
}
#ayarPanel{
position:fixed;top:60px;right:10px;background:#fff;padding:10px;border-radius:10px;display:none;z-index:1000
}

/* PANEL */
.panel{
background:#fff;padding:10px;display:flex;flex-wrap:wrap;gap:8px;position:sticky;top:0
}
.panel input{padding:8px}

/* A4 */
#afis{
width:794px;height:1123px;margin:10px auto;background:#fff;overflow:hidden
}

/* HEADER */
.header{
display:grid;grid-template-columns:1.5fr 0.7fr 0.5fr;gap:10px;padding:10px
}

.logoSatir{
font-size:70px;font-weight:900;font-style:italic
}

.g1{color:#1ca42f}
.g2{color:#f5a300}
.g3{color:#f5a300}

/* TARİH */
.tarihKutu{
background:#49a63a;color:#fff;border-radius:30px;padding:10px;
display:flex;flex-direction:column;align-items:center;justify-content:center
}
.tarihSatir{display:flex;gap:8px}
.tarihInputKucuk{text-align:center;width:50px}
.tarihInputAy{text-align:center;margin-top:6px}

/* QR */
.qr{text-align:center}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(4,1fr);
height:700px;
}

/* CARD */
.card{border:1px solid #ddd;padding:5px;text-align:center;display:flex;flex-direction:column}

/* 🔥 4 KAT RESİM */
.imgBox{
height:280px;
}
.imgBox img{
width:100%;
height:100%;
object-fit:cover;
}

.urunAdi{font-size:14px;font-weight:bold}
.aciklama{font-size:9px}
.eski{text-decoration:line-through;color:red;font-size:14px}
.yeni{color:green;font-size:26px;font-weight:bold}
.indirim{background:gold;margin-top:auto;padding:4px}

/* PRINT */
@media print{
.panel,#ayarBtn,#ayarPanel,#login{display:none}
@page{size:A4;margin:0}
}
</style>
</head>

<body>

<div id="login">
<h2>Şifre</h2>
<input type="password" id="sifre">
<button onclick="giris()">Giriş</button>
</div>

<button id="ayarBtn" onclick="toggleAyar()">⚙️</button>

<div id="ayarPanel">
<button onclick="window.print()">PDF</button>
</div>

<div class="panel">
<input id="urunAdiInput" placeholder="Ürün">
<input id="eskiInput" type="number">
<input id="yeniInput" type="number">
<input type="file" id="resimInput">
<button onclick="urunEkle()">Ekle</button>
</div>

<div id="afis">

<div class="header">
<div class="logoSatir">
<span class="g1">GRO</span><span class="g2">S</span><span class="g1">S</span><span class="g3">MUT</span>
</div>

<div class="tarihKutu">
<div>GEÇERLİLİK</div>
<div class="tarihSatir">
<input id="basGun" type="number" value="21">
-
<input id="bitGun" type="number" value="24">
</div>
<input id="ayInput" value="NİSAN">
</div>

<div class="qr">
<img src="IMG_8553.jpeg" width="100">
</div>
</div>

<div class="grid" id="grid"></div>

</div>

<script>
let urunler=[],resim="";

resimInput.onchange=e=>{
let f=e.target.files[0];
let r=new FileReader();
r.onload=x=>resim=x.target.result;
r.readAsDataURL(f);
};

eskiInput.oninput=function(){this.value=this.value.replace(/[^0-9]/g,'')}
yeniInput.oninput=function(){this.value=this.value.replace(/[^0-9]/g,'')}
basGun.oninput=function(){this.value=this.value.replace(/[^0-9]/g,'')}
bitGun.oninput=function(){this.value=this.value.replace(/[^0-9]/g,'')}

function urunEkle(){
if(urunler.length>=12)return;
urunler.push({
ad:urunAdiInput.value,
eski:eskiInput.value,
yeni:yeniInput.value,
resim:resim
});
ciz();
}

function ciz(){
let html="";
for(let i=0;i<12;i++){
let u=urunler[i]||{};
html+=`
<div class="card">
<div class="imgBox">${u.resim?`<img src="${u.resim}">`:``}</div>
<div class="urunAdi">${u.ad||""}</div>
<div class="eski">${u.eski||""}</div>
<div class="yeni">${u.yeni||""}</div>
<div class="indirim">İNDİRİM</div>
</div>`;
}
grid.innerHTML=html;
}

function toggleAyar(){
ayarPanel.style.display=ayarPanel.style.display==="block"?"none":"block";
}

function giris(){
login.style.display="none";
}
</script>

</body>
</html>
