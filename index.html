<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<title>Grossmut PRO</title>

<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#eee}

/* PANEL */
.panel{background:#fff;padding:10px;display:flex;gap:6px;flex-wrap:wrap}
.panel input,.panel select{padding:6px;border-radius:6px;border:1px solid #ccc}
.panel button{padding:6px 10px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
.ekle{background:#ff7a00;color:#fff}
.pdf{background:#222;color:#fff}

/* AFİŞ */
#afis{width:794px;height:1123px;margin:auto;background:#fff;padding:15px}

/* LOGO */
.logo{font-family:'Montserrat';font-size:64px;font-weight:900;font-style:italic}
.g1{color:#0b7d2b}
.g2{color:#ff5b00}

/* BAŞLIK */
.baslik1{font-family:'Montserrat';font-size:34px;font-weight:900;color:#0b7d2b;border:none;width:100%}
.baslik2{font-family:'Montserrat';font-size:80px;font-weight:900;color:#ff5b00;border:none;width:100%}

/* TARİH */
.tarih{background:#0b7d2b;color:#fff;padding:8px;border-radius:10px;display:inline-block}
.tarih input{background:transparent;border:none;color:#fff;font-weight:bold}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}

/* KART */
.card{
border:1px solid #ddd;
border-radius:12px;
padding:10px;
position:relative;
text-align:center;
display:flex;
flex-direction:column;
}

/* ROZET */
.rozet{
position:absolute;
top:8px;
right:8px;
background:red;
color:#fff;
padding:4px 8px;
border-radius:12px;
font-size:11px;
font-weight:bold;
}

/* RESİM */
.card img{
height:130px;
object-fit:contain;
}

/* YAZI */
.ad{font-weight:900}
.aciklama{font-size:12px;color:#666}

/* FİYAT */
.eski{text-decoration:line-through;color:#444}
.yeni{font-size:32px;color:#0b7d2b;font-weight:900}
.tl{color:#ff5b00;font-size:16px}

/* YÜZDE */
.yuzde{color:red;font-weight:bold;font-size:12px}

/* ALT */
.alt{margin-top:20px;background:#0b7d2b;color:#fff;padding:10px;text-align:center}

/* PRINT */
@media print{.panel{display:none}}
</style>
</head>

<body>

<div class="panel">
<input id="ad" placeholder="Ürün">
<input id="aciklama" placeholder="Açıklama">
<input id="eski" type="number">
<input id="yeni" type="number">

<select id="rozet">
<option>FIRSAT</option>
<option>ŞOK FİYAT</option>
<option>EN ÇOK SATAN</option>
</select>

<input type="file" id="resim">

<button class="ekle" onclick="ekle()">Ekle</button>
<button class="pdf" onclick="pdf()">PDF</button>
</div>

<div id="afis">

<div class="logo">
<span class="g1">GRO</span><span class="g2">SS MUT</span>
</div>

<input class="baslik1" value="HAFTA İÇİNE ÖZEL">
<input class="baslik2" value="İNDİRİM">

<div class="tarih">
<input value="27 Nisan - 30 Nisan">
</div>

<div class="grid" id="grid"></div>

<div class="alt">GROSSMUT - STOKLARLA SINIRLIDIR</div>

</div>

<script>
let urunler=[];

resim.onchange=e=>{
let r=new FileReader();
r.onload=x=>resim.data=x.target.result;
r.readAsDataURL(e.target.files[0]);
};

function indirim(eski,yeni){
if(!eski||!yeni)return "";
return "%"+Math.round((eski-yeni)*100/eski);
}

function ekle(){
urunler.push({
ad:ad.value,
aciklama:aciklama.value,
eski:eski.value,
yeni:yeni.value,
rozet:rozet.value,
resim:resim.data
});
ciz();
}

function ciz(){
let html="";
urunler.forEach(u=>{
html+=`
<div class="card">
<div class="rozet">${u.rozet}</div>
<img src="${u.resim||''}">
<div class="ad">${u.ad}</div>
<div class="aciklama">${u.aciklama}</div>
<div class="eski">${u.eski} TL</div>
<div class="yuzde">${indirim(u.eski,u.yeni)}</div>
<div class="yeni">${u.yeni} <span class="tl">TL</span></div>
</div>
`;
});
grid.innerHTML=html;
}

function pdf(){
html2pdf().from(document.getElementById("afis")).save("Grossmut.pdf");
}
</script>

</body>
</html>
