<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grossmut Afiş</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eee}

/* LOGIN */
#login{
position:fixed;inset:0;background:#111;color:#fff;
display:flex;flex-direction:column;align-items:center;justify-content:center;
z-index:9999;
}
#login input{padding:12px;font-size:18px;border:none;border-radius:8px}
#login button{margin-top:10px;padding:10px;background:green;color:#fff;border:none;border-radius:6px}

/* SETTINGS ICON */
#ayarBtn{
position:fixed;top:10px;right:10px;
font-size:25px;background:#fff;border-radius:50%;
padding:8px;cursor:pointer;z-index:50;
}

/* SETTINGS PANEL */
#ayarPanel{
position:fixed;top:60px;right:10px;
background:#fff;padding:10px;border-radius:10px;
display:none;z-index:50;width:220px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}
#ayarPanel input{width:100%;margin-top:5px;padding:8px}
#ayarPanel button{margin-top:5px;width:100%;padding:8px}

/* AFIS */
#afis{
width:794px;height:1123px;margin:10px auto;background:#fff;overflow:hidden;position:relative;
}

/* HEADER */
.header{
display:flex;justify-content:space-between;align-items:center;padding:15px;
}
.logo{
font-size:55px;font-weight:900;
}
.logo span:first-child{color:#16a34a}
.logo span:last-child{color:#f59e0b}

.tarih{
background:green;color:#fff;padding:10px;border-radius:10px;font-weight:bold;
}

/* QR */
.qr{text-align:center}
.qr img{width:100px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(4,1fr);
height:900px;
}

/* CARD */
.card{
border:1px solid #ddd;padding:5px;text-align:center;display:flex;flex-direction:column;
}
.imgBox{height:130px}
.imgBox img{width:100%;height:100%;object-fit:cover}

.eski{text-decoration:line-through;color:red}
.yeni{color:green;font-size:40px;font-weight:bold}

.indirim{background:gold;padding:5px;font-weight:bold;margin-top:auto}

/* PRINT */
@media print{
#login,#ayarBtn,#ayarPanel{display:none!important}
body{background:#fff}
#afis{margin:0;box-shadow:none}
@page{size:A4;margin:0}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Şifre</h2>
<input type="password" id="sifre">
<button onclick="giris()">Giriş</button>
</div>

<!-- SETTINGS -->
<div id="ayarBtn" onclick="toggleAyar()">⚙️</div>

<div id="ayarPanel">
<input type="password" id="eski" placeholder="Mevcut şifre">
<input type="password" id="yeni" placeholder="Yeni şifre">
<input type="password" id="tekrar" placeholder="Tekrar">
<button onclick="sifreDegistir()">Kaydet</button>
<button onclick="window.print()">PDF</button>
</div>

<!-- AFIS -->
<div id="afis">

<div class="header">
<div>
<div class="logo">
<span>GROSS</span><span>MUT</span>
</div>
<div><b>HAFTANIN YILDIZLARI</b></div>
</div>

<div class="tarih">
<input id="bas" type="number" value="21" style="width:40px"> -
<input id="bit" type="number" value="24" style="width:40px"><br>
<input id="ay" value="NİSAN" style="width:80px">
</div>

<div class="qr">
<img src="IMG_8553.jpeg">
<div>@grossmut33</div>
</div>
</div>

<div class="grid" id="grid"></div>

</div>

<script>

// PASSWORD
function aktifSifre(){
return localStorage.getItem("sifre")||"Grossmut7433";
}

function giris(){
if(document.getElementById("sifre").value===aktifSifre()){
document.getElementById("login").style.display="none";
}else alert("Yanlış");
}

function sifreDegistir(){
let e=document.getElementById("eski").value;
let y=document.getElementById("yeni").value;
let t=document.getElementById("tekrar").value;

if(e!==aktifSifre()) return alert("Eski yanlış");
if(y!==t) return alert("Aynı değil");

localStorage.setItem("sifre",y);
alert("Değişti");
}

function toggleAyar(){
let p=document.getElementById("ayarPanel");
p.style.display=p.style.display==="block"?"none":"block";
}

// GRID 12 KARE
let html="";
for(let i=0;i<12;i++){
html+=`
<div class="card">
<div class="imgBox"><img src="IMG_8553.jpeg"></div>
<div><b>ÜRÜN</b></div>
<div class="eski">100</div>
<div class="yeni">59</div>
<div class="indirim">İNDİRİM</div>
</div>
`;
}
document.getElementById("grid").innerHTML=html;

</script>

</body>
</html>
