<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grossmut Afiş</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f0f2f5}

/* ŞİFRE */
#login{text-align:center;margin-top:120px}
#login input{padding:10px;font-size:18px}

/* PANEL */
.panel{background:#fff;padding:10px}
input{padding:8px;margin:3px;border:1px solid #ccc;border-radius:6px}
button{padding:8px;border:none;border-radius:6px;font-weight:bold}
.yesil{background:green;color:#fff}
.turuncu{background:orange;color:#fff}

/* AFİŞ */
.poster{max-width:1100px;margin:auto;background:#fff}

.ust{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:15px;
}

/* LOGO */
.logo{
  font-size:45px;
  font-weight:900;
}
.logo span:first-child{color:green}
.logo span:last-child{color:orange}

.baslik{
  font-size:22px;
  font-weight:900;
}

/* TARİH */
.tarih{
  background:green;
  color:#fff;
  padding:15px;
  border-radius:15px;
  font-weight:bold;
  text-align:center;
}

/* QR */
.qr{
  background:#fff;
  padding:10px;
  border-radius:12px;
  text-align:center;
  width:150px;
  box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.qr img{
  width:100%;
  border-radius:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
}

.kart{
  border:1px solid #ddd;
  padding:10px;
  height:430px;
  text-align:center;
  display:flex;
  flex-direction:column;
}

.resim{
  height:210px;
}
.resim img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* YAZILAR */
.ad{
  font-size:24px;
  font-weight:900;
}

.aciklama{
  font-size:13px;
  color:#666;
}

.eski{
  text-decoration:line-through;
  color:red;
}

.yeni{
  font-size:48px;
  font-weight:900;
  color:green;
}

/* ALT ŞERİT */
.indirim{
  margin-top:auto;
  background:#d4a017;
  font-weight:900;
  padding:6px;
}

/* PRINT */
@media print{
  .panel{display:none}
}
</style>
</head>

<body>

<!-- ŞİFRE -->
<div id="login">
  <h2>Şifre Gir</h2>
  <input type="password" id="sifre">
  <button onclick="giris()">Giriş</button>
</div>

<!-- SİTE -->
<div id="site" style="display:none;">

<div class="panel">
<input id="baslikInput" placeholder="Başlık">
<input id="tarihInput" placeholder="Tarih">
<button class="yesil" onclick="guncelle()">Güncelle</button>

<br>

<input id="ad" placeholder="Ürün adı">
<input id="aciklama" placeholder="Açıklama">
<input id="eski" placeholder="Eski fiyat">
<input id="yeni" placeholder="Yeni fiyat">
<input type="file" id="resim">

<button class="turuncu" onclick="ekle()">Ürün ekle</button>
<button onclick="window.print()">PDF</button>
</div>

<div class="poster">

<div class="ust">
  <div>
    <div class="logo"><span>GROSS</span> <span>MUT</span></div>
    <div class="baslik" id="baslik">HAFTANIN YILDIZLARI</div>
  </div>

  <div class="tarih" id="tarih">16-23 NİSAN</div>

  <!-- 🔥 INSTAGRAM QR -->
  <div class="qr">
    <img src="qr.png">

    <div style="font-weight:bold;margin-top:5px;">
      @grossmut33
    </div>

    <div style="font-size:12px;color:#444;">
      Bizi takip edin
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>

</div>
</div>

<script>

let urunler=[]
let imgData=""

/* 🔒 ŞİFRE */
function giris(){
  if(sifre.value==="Grossmut7433"){
    login.style.display="none"
    site.style.display="block"
  }else{
    alert("Şifre yanlış")
  }
}

/* BAŞLIK */
function guncelle(){
  baslik.innerText=baslikInput.value
  tarih.innerText=tarihInput.value
}

/* RESİM */
resim.onchange=function(e){
  let r=new FileReader()
  r.onload=function(x){imgData=x.target.result}
  r.readAsDataURL(e.target.files[0])
}

/* EKLE */
function ekle(){
  if(urunler.length>=12){
    alert("Max 12 ürün")
    return
  }

  urunler.push({
    ad:ad.value,
    aciklama:aciklama.value,
    eski:eski.value,
    yeni:yeni.value,
    img:imgData
  })

  ciz()
}

/* ÇİZ */
function ciz(){
  let h=""
  for(let i=0;i<12;i++){
    let u=urunler[i]

    h+=`
    <div class="kart">
      <div class="resim">${u?`<img src="${u.img}">`:""}</div>
      <div class="ad">${u?u.ad:""}</div>
      <div class="aciklama">${u?u.aciklama:""}</div>
      <div class="eski">${u?u.eski:""}</div>
      <div class="yeni">${u?u.yeni:""}</div>
      <div class="indirim">İNDİRİM ŞOKU</div>
    </div>`
  }

  grid.innerHTML=h
}

ciz()

</script>

</body>
</html>
