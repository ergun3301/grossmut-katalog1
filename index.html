<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grossmut Afiş</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #eceff1;
    }

    #login {
      position: fixed;
      inset: 0;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #login h2 {
      margin: 0 0 12px;
    }

    #login input {
      width: 240px;
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      text-align: center;
    }

    #login button {
      margin-top: 10px;
      padding: 10px 20px;
      background: green;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .panel {
      background: #fff;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    .panel input,
    .panel button {
      padding: 8px;
      border-radius: 6px;
      font-size: 14px;
    }

    .panel input {
      border: 1px solid #ccc;
    }

    .panel button {
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btnEkle { background: orange; color: #fff; }
    .btnPdf { background: #666; color: #fff; }
    .btnTemizle { background: #c62828; color: #fff; }
    .btnResimSil { background: #777; color: #fff; }

    #afis {
      width: 794px;
      height: 1123px;
      margin: 10px auto;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
    }

    .header {
      display: grid;
      grid-template-columns: 1.5fr 0.7fr 0.5fr;
      gap: 10px;
      padding: 10px;
      align-items: start;
    }

    .logoSatir {
      font-size: 70px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -3px;
      line-height: .9;
      white-space: nowrap;
    }

    .g1 { color: #1ca42f; }
    .g2 { color: #f5a300; }
    .g3 { color: #f5a300; }

    .altBaslik {
      margin-top: 6px;
      font-size: 24px;
      font-weight: 900;
      text-transform: uppercase;
      color: #111;
    }

    .tarihKutu {
      background: #49a63a;
      color: #fff;
      border-radius: 30px;
      padding: 12px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 128px;
    }

    .tarihBaslik {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: .4px;
    }

    .tarihSatir {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .tarihInputKucuk {
      width: 56px;
      height: 38px;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: #111;
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      outline: none;
    }

    .tarihAyirici {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
    }

    .tarihInputAy {
      width: 120px;
      height: 38px;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: #111;
      text-align: center;
      font-size: 16px;
      font-weight: 900;
      margin-top: 8px;
      outline: none;
    }

    .qr {
      text-align: center;
      background: #fff;
      border-radius: 14px;
      padding: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,.08);
    }

    .qr img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      border-radius: 10px;
    }

    .qr .kullanici {
      font-weight: 900;
      font-size: 15px;
      margin-top: 4px;
    }

    .qr .takip {
      font-size: 12px;
      color: #555;
    }

    .cizgi {
      height: 5px;
      background: #1ca42f;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      height: 860px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 5px;
      display: flex;
      flex-direction: column;
      position: relative;
      text-align: center;
      overflow: hidden;
    }

    .silBtn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: red;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      cursor: pointer;
      font-size: 12px;
    }

    .imgSilBtn {
      position: absolute;
      top: 5px;
      left: 5px;
      background: #666;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 10px;
      padding: 2px 6px;
      cursor: pointer;
    }

    .imgBox {
      height: 70px;
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .imgBox img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .urunAdi {
      font-size: 14px;
      font-weight: bold;
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      color: #111;
      cursor: pointer;
    }

    .aciklama {
      font-size: 10px;
      color: #666;
      min-height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
    }

    .eski {
      color: red;
      text-decoration: line-through;
      font-size: 14px;
      min-height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .yeni {
      color: green;
      font-size: 26px;
      font-weight: bold;
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .indirim {
      background: gold;
      padding: 5px;
      margin-top: auto;
      font-weight: bold;
      font-size: 13px;
    }

    @media print {
      .panel, #login {
        display: none !important;
      }
      .silBtn, .imgSilBtn {
        display: none !important;
      }
      @page {
        size: A4;
        margin: 0;
      }
      body {
        background: #fff;
      }
      #afis {
        margin: 0 auto;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

<div id="login">
  <h2>Şifre</h2>
  <input type="password" id="sifre">
  <button onclick="giris()">Giriş</button>
</div>

<div class="panel">
  <input id="urunAdiInput" placeholder="Ürün">
  <input id="aciklamaInput" placeholder="Açıklama">
  <input id="eskiInput" type="number" inputmode="numeric" placeholder="Eski fiyat">
  <input id="yeniInput" type="number" inputmode="numeric" placeholder="Yeni fiyat">
  <input type="file" id="resimInput">
  <button class="btnEkle" onclick="urunEkle()">Ekle</button>
  <button class="btnResimSil" onclick="seciliResmiTemizle()">Resim Sil</button>
  <button class="btnPdf" onclick="window.print()">PDF</button>
  <button class="btnTemizle" onclick="tumunuTemizle()">Temizle</button>
</div>

<div id="afis">
  <div class="header">
    <div>
      <div class="logoSatir">
        <span class="g1">GRO</span><span class="g2">S</span><span class="g1">S</span><span class="g3">MUT</span>
      </div>
      <div class="altBaslik">HAFTANIN YILDIZLARI</div>
    </div>

    <div class="tarihKutu">
      <div class="tarihBaslik">GEÇERLİLİK TARİHİ</div>
      <div class="tarihSatir">
        <input id="basGun" class="tarihInputKucuk" type="number" value="21">
        <span class="tarihAyirici">-</span>
        <input id="bitGun" class="tarihInputKucuk" type="number" value="24">
      </div>
      <input id="ayInput" class="tarihInputAy" value="NİSAN">
    </div>

    <div class="qr">
      <img src="IMG_8553.jpeg" alt="QR">
      <div class="kullanici">@grossmut33</div>
      <div class="takip">Bizi takip edin</div>
    </div>
  </div>

  <div class="cizgi"></div>
  <div class="grid" id="grid"></div>
</div>

<script>
  const KAYIT_ANAHTAR = "grossmut_katalog_kayitlari_v1";
  const TARIH_ANAHTAR = "grossmut_katalog_tarih_v1";

  let urunler = [];
  let resim = "";
  let duzenlenenIndex = null;

  function giris() {
    if (document.getElementById("sifre").value === "7433") {
      document.getElementById("login").style.display = "none";
    } else {
      alert("Yanlış şifre");
    }
  }

  function kaydet() {
    localStorage.setItem(KAYIT_ANAHTAR, JSON.stringify(urunler));

    const tarih = {
      basGun: document.getElementById("basGun").value,
      bitGun: document.getElementById("bitGun").value,
      ay: document.getElementById("ayInput").value
    };
    localStorage.setItem(TARIH_ANAHTAR, JSON.stringify(tarih));
  }

  function yukle() {
    try {
      const kayitliUrunler = localStorage.getItem(KAYIT_ANAHTAR);
      if (kayitliUrunler) {
        urunler = JSON.parse(kayitliUrunler) || [];
      }

      const kayitliTarih = localStorage.getItem(TARIH_ANAHTAR);
      if (kayitliTarih) {
        const tarih = JSON.parse(kayitliTarih);
        if (tarih) {
          document.getElementById("basGun").value = tarih.basGun || "21";
          document.getElementById("bitGun").value = tarih.bitGun || "24";
          document.getElementById("ayInput").value = tarih.ay || "NİSAN";
        }
      }
    } catch (e) {
      console.error(e);
    }
  }

  resimInput.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = x => resim = x.target.result;
    r.readAsDataURL(f);
  };

  function seciliResmiTemizle() {
    resim = "";
    resimInput.value = "";
  }

  eskiInput.oninput = function() {
    this.value = this.value.replace(/[^0-9]/g, "");
  };
  yeniInput.oninput = function() {
    this.value = this.value.replace(/[^0-9]/g, "");
  };
  basGun.oninput = function() {
    this.value = this.value.replace(/[^0-9]/g, "");
    kaydet();
  };
  bitGun.oninput = function() {
    this.value = this.value.replace(/[^0-9]/g, "");
    kaydet();
  };
  ayInput.oninput = function() {
    kaydet();
  };

  function urunEkle() {
    const yeniKayit = {
      ad: urunAdiInput.value || "",
      aciklama: aciklamaInput.value || "",
      eski: (eskiInput.value || "").replace(/[^0-9]/g, ""),
      yeni: (yeniInput.value || "").replace(/[^0-9]/g, ""),
      resim: resim || ""
    };

    if (duzenlenenIndex !== null) {
      urunler[duzenlenenIndex] = {
        ...urunler[duzenlenenIndex],
        ...yeniKayit,
        resim: resim || urunler[duzenlenenIndex].resim || ""
      };
      duzenlenenIndex = null;
    } else {
      if (urunler.length >= 12) return;
      urunler.push(yeniKayit);
    }

    urunAdiInput.value = "";
    aciklamaInput.value = "";
    eskiInput.value = "";
    yeniInput.value = "";
    resimInput.value = "";
    resim = "";

    kaydet();
    ciz();
  }

  function sil(i) {
    urunler.splice(i, 1);
    if (duzenlenenIndex === i) duzenlenenIndex = null;
    kaydet();
    ciz();
  }

  function resimSil(i) {
    if (!urunler[i]) return;
    urunler[i].resim = "";
    kaydet();
    ciz();
  }

  function duzenle(i) {
    const u = urunler[i];
    if (!u) return;
    urunAdiInput.value = u.ad || "";
    aciklamaInput.value = u.aciklama || "";
    eskiInput.value = u.eski || "";
    yeniInput.value = u.yeni || "";
    resim = "";
    resimInput.value = "";
    duzenlenenIndex = i;
  }

  function tumunuTemizle() {
    urunler = [];
    duzenlenenIndex = null;
    urunAdiInput.value = "";
    aciklamaInput.value = "";
    eskiInput.value = "";
    yeniInput.value = "";
    resimInput.value = "";
    resim = "";
    localStorage.removeItem(KAYIT_ANAHTAR);
    ciz();
  }

  function ciz() {
    let html = "";
    for (let i = 0; i < 12; i++) {
      const u = urunler[i] || {};
      html += `
        <div class="card">
          ${u.ad ? `<button class="silBtn" onclick="sil(${i})">X</button>` : ``}
          ${u.resim ? `<button class="imgSilBtn" onclick="resimSil(${i})">Resim Sil</button>` : ``}
          <div class="imgBox">${u.resim ? `<img src="${u.resim}">` : ``}</div>
          <div class="urunAdi" onclick="duzenle(${i})">${u.ad || ""}</div>
          <div class="aciklama">${u.aciklama || ""}</div>
          <div class="eski">${u.eski || ""}</div>
          <div class="yeni">${u.yeni || ""}</div>
          <div class="indirim">İNDİRİM</div>
        </div>`;
    }
    grid.innerHTML = html;
  }

  yukle();
  ciz();
</script>

</body>
</html>
