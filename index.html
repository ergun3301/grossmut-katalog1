<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grossmut</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eceff1}

/* LOGIN */
#login{
position:fixed;inset:0;background:#111;color:#fff;
display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999
}
#login input{padding:12px;font-size:18px;border-radius:8px;border:none;text-align:center}
#login button{margin-top:10px;padding:10px 20px;background:green;color:#fff;border:none;border-radius:8px}

/* PANEL */
.panel{
background:#fff;padding:10px;display:flex;flex-wrap:wrap;gap:8px
}

/* A4 */
#afis{
width:794px;height:1123px;margin:auto;background:#fff;overflow:hidden
}

/* HEADER */
.header{
display:grid;
grid-template-columns:1.5fr 0.5fr 0.5fr;
align-items:center;
gap:10px;
padding:10px;
}

/* LOGO */
.logoSatir{font-size:70px;font-weight:900;font-style:italic}
.g1{color:#1ca42f}
.g2{color:#f5a300}
.g3{color:#f5a300}

/* BAŞLIK */
.altBaslik{
margin-top:6px;
font-size:24px;
font-weight:900;
border:none;
background:transparent;
outline:none;
}

/* 🔥 TARİH TAM SIKIŞTIRILDI */
.tarihKutu{
background:#49a63a;
color:#fff;
border-radius:18px;
padding:6px 8px;
width:120px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.tarihBaslik{
font-size:10px;
font-weight:800;
margin-bottom:2px;
}

.tarihSatir{
display:flex;
align-items:center;
justify-content:center;
gap:2px;
}

.tarihInputKucuk{
width:28px;
height:24px;
border:none;
border-radius:6px;
background:#fff;
text-align:center;
font-weight:900;
font-size:13px;
padding:0;
}

.tarihAyirici{
font-size:14px;
font-weight:900;
}

.tarihInputAy{
width:70px;
height:24px;
margin-top:3px;
border:none;
border-radius:6px;
background:#fff;
text-align:center;
font-weight:900;
font-size:11px;
padding:0;
}

/* QR */
.qr img{
width:130px;
height:130px;
object-fit:contain;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(4,1fr);
height:860px;
}

/* CARD */
.card{
border:1px solid #ddd;
padding:5px;
display:flex;
flex-direction:column;
position:relative;
text-align:center;
}

/* RESİM */
.imgBox{
height:90px;
margin-top:22px;
}
.imgBox img{
width:100%;
height:100%;
object-fit:contain;
}

/* TEXT */
.urunAdi{font-size:14px;font-weight:bold}
.aciklama{font-size:10px;color:#666}
.eski{color:red;text-decoration:line-through}
.yeni{color:green;font-size:26px;font-weight:bold}
.indirim{background:gold;padding:5px;margin-top:auto}

/* PRINT */
@media print{
.panel,#login{display:none}
}
</style>
</head>

<body>

<div id="login">
<h2>Şifre</h2>
<input type="password" id="sifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="afis">

<div class="header">

<div>
<div class="logoSatir">
<span class="g1">GRO</span><span class="g2">S</span><span class="g1">S</span><span class="g3">MUT</span>
</div>
<input id="baslikInput" class="altBaslik" value="HAFTANIN YILDIZLARI">
</div>

<div class="tarihKutu">
<div class="tarihBaslik">GEÇERLİLİK</div>
<div class="tarihSatir">
<input id="basGun" type="number" value="21">
<span class="tarihAyirici">-</span>
<input id="bitGun" type="number" value="24">
</div>
<input id="ayInput" value="NİSAN">
</div>

<div class="qr">
<img src="IMG_8553.jpeg">
</div>

</div>

<div class="grid" id="grid"></div>

</div>

<script>
function giris(){
if(document.getElementById("sifre").value==="7433"){
document.getElementById("login").style.display="none";
}
}
</script>

</body>
</html>
