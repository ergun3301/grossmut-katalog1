<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grossmut Afiş</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #eceff1;
    }

    #login {
      position: fixed;
      inset: 0;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    #login h2 {
      margin-bottom: 12px;
    }

    #login input {
      width: 240px;
      padding: 12px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      text-align: center;
    }

    #login button {
      margin-top: 10px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: green;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }

    #ayarBtn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
      font-size: 22px;
      cursor: pointer;
    }

    #ayarPanel {
      position: fixed;
      top: 60px;
      right: 10px;
      z-index: 1000;
      width: 270px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
      padding: 10px;
      display: none;
    }

    #ayarPanel input,
    #ayarPanel button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    #ayarPanel button {
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .btnGri { background: #666; color: #fff; }
    .btnYesil { background: green; color: #fff; }
    .btnTuruncu { background: orange; color: #fff; }
    .btnKirmizi { background: #c62828; color: #fff; }

    .panel {
      background: #fff;
      padding: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    .panel input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .panel button {
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    #afis {
      width: 794px;
      height: 1123px;
      margin: 12px auto;
      background: #fff;
      overflow: hidden;
      position: relative;
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
    }

    .header {
      display: grid;
      grid-template-columns: 1.55fr 0.75fr 0.50fr;
      gap: 12px;
      align-items: start;
      padding: 14px 16px 10px 16px;
    }

    .logoSatir {
      font-size: 66px;
      font-weight: 900;
      letter-spacing: -3px;
      line-height: .9;
      white-space: nowrap;
      text-transform: uppercase;
      font-style: italic;
      text-shadow: 0 2px 0 rgba(0,0,0,0.05);
    }

    .g1 { color: #16a34a; }
    .g2 { color: #f5a300; }
    .g3 { color: #f5a300; }

    .altBaslik {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.05;
      color: #111;
    }

    .tarihKutu {
      background: #49a63a;
      color: #fff;
      border-radius: 28px;
      padding: 14px 16px;
      min-height: 126px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .tarihKutu .k1 {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .4px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .tarihSatir {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin: 0 auto;
    }

    .tarihAyirici {
      font-size: 24px;
      font-weight: 900;
      color: #fff;
    }

    .tarihInputKucuk {
      width: 52px;
      height: 38px;
      border: none;
      border-radius: 10px;
      text-align: center;
      padding: 4px;
      font-size: 18px;
      font-weight: 900;
      color: #111;
      background: #fff;
      outline: none;
    }

    .tarihInputAy {
      width: 120px;
      height: 38px;
      border: none;
      border-radius: 10px;
      text-align: center;
      padding: 4px;
      font-size: 16px;
      font-weight: 900;
      color: #111;
      background: #fff;
      margin-top: 8px;
      margin-left: auto;
      margin-right: auto;
      display: block;
      outline: none;
    }

    .qr {
      text-align: center;
      background: #fff;
      border-radius: 14px;
      padding: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,.08);
    }

    .qr img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      border-radius: 12px;
      display: block;
      margin: 0 auto;
    }

    .qr .kullanici {
      font-weight: 900;
      font-size: 16px;
      margin-top: 4px;
      color: #111;
    }

    .qr .takip {
      font-size: 12px;
      color: #555;
    }

    .cizgi {
      height: 5px;
      background: #1ca42f;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      height: 880px;
    }

    .card {
      border-right: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      padding: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .card:nth-child(3n) {
      border-right: none;
    }

    .imgBox {
      width: 100%;
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .imgBox img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .urunAdi {
      font-size: 19px;
      font-weight: 900;
      line-height: 1.02;
      min-height: 40px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
    }

    .aciklama {
      font-size: 11px;
      color: #666;
      line-height: 1.1;
      min-height: 24px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .eski {
      text-decoration: line-through;
      color: red;
      font-size: 22px;
      font-weight: bold;
      min-height: 24px;
      margin-top: 4px;
    }

    .yeni {
      color: green;
      font-size: 46px;
      font-weight: 900;
      line-height: 1;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .indirim {
      background: #d4a017;
      color: #6a4a00;
      font-weight: 900;
      width: 100%;
      padding: 6px 0;
      margin-top: auto;
      text-transform: uppercase;
      font-size: 16px;
    }

    .footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 8px 14px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: bold;
      color: #555;
      background: #fff;
    }

    .footer .site {
      font-size: 18px;
      font-weight: 900;
      color: #222;
    }

    @media print {
      #login,
      #ayarBtn,
      #ayarPanel,
      .panel {
        display: none !important;
      }

      body {
        background: #fff;
      }

      #afis {
        margin: 0;
        box-shadow: none;
      }

      @page {
        size: A4;
        margin: 0;
      }
    }
  </style>
</head>
<body>

  <div id="login">
    <h2>Şifre Gir</h2>
    <input type="password" id="sifreInput" placeholder="Şifre">
    <button onclick="giris()">Giriş</button>
  </div>

  <button id="ayarBtn" onclick="ayarAcKapat()">⚙️</button>

  <div id="ayarPanel">
    <input type="password" id="eskiSifreInput" placeholder="Mevcut şifre">
    <input type="password" id="yeniSifreInput" placeholder="Yeni şifre">
    <input type="password" id="tekrarSifreInput" placeholder="Tekrar">
    <button class="btnYesil" onclick="sifreDegistir()">Kaydet</button>
    <button class="btnGri" onclick="window.print()">PDF</button>
  </div>

  <div class="panel">
    <input id="baslikInput" placeholder="Başlık" value="HAFTANIN YILDIZLARI">
    <button class="btnYesil" onclick="baslikGuncelle()">Güncelle</button>

    <input id="urunAdiInput" placeholder="Ürün adı">
    <input id="aciklamaInput" placeholder="Açıklama">

    <input id="eskiInput" type="number" inputmode="numeric" min="0" step="1" placeholder="Eski fiyat">
    <input id="yeniInput" type="number" inputmode="numeric" min="0" step="1" placeholder="Yeni fiyat">

    <input type="file" id="resimInput" accept="image/*">

    <button class="btnTuruncu" onclick="urunEkle()">Ürün Ekle</button>
    <button class="btnKirmizi" onclick="temizle()">Temizle</button>
  </div>

  <div id="afis">
    <div class="header">
      <div>
        <div class="logoSatir">
          <span class="g1">GRO</span><span class="g2">S</span><span class="g1">S</span><span class="g3">MUT</span>
        </div>
        <div class="altBaslik" id="afisBaslik">HAFTANIN YILDIZLARI</div>
      </div>

      <div class="tarihKutu">
        <div class="k1">GEÇERLİLİK TARİHİ</div>
        <div class="tarihSatir">
          <input class="tarihInputKucuk" id="basGun" type="number" value="21">
          <span class="tarihAyirici">-</span>
          <input class="tarihInputKucuk" id="bitGun" type="number" value="24">
        </div>
        <input class="tarihInputAy" id="ayInput" value="NİSAN">
      </div>

      <div class="qr">
        <img src="IMG_8553.jpeg" alt="Instagram QR">
        <div class="kullanici">@grossmut33</div>
        <div class="takip">Bizi takip edin</div>
      </div>
    </div>

    <div class="cizgi"></div>

    <div class="grid" id="grid"></div>

    <div class="footer">
      <div>Fiyatlar stoklarla sınırlıdır. Görseller temsilidir.</div>
      <div class="site">WWW.GROSSMUT.COM</div>
    </div>
  </div>

  <script>
    let secilenResim = "";
    let urunler = [];

    function aktifSifreGetir() {
      return localStorage.getItem("grossmut_sifre") || "Grossmut7433";
    }

    function giris() {
      const sifre = document.getElementById("sifreInput").value;
      if (sifre === aktifSifreGetir()) {
        document.getElementById("login").style.display = "none";
      } else {
        alert("Şifre yanlış");
      }
    }

    function ayarAcKapat() {
      const panel = document.getElementById("ayarPanel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    function sifreDegistir() {
      const eski = document.getElementById("eskiSifreInput").value;
      const yeni = document.getElementById("yeniSifreInput").value;
      const tekrar = document.getElementById("tekrarSifreInput").value;

      if (eski !== aktifSifreGetir()) {
        alert("Mevcut şifre yanlış.");
        return;
      }

      if (!yeni || yeni.length < 4) {
        alert("Yeni şifre en az 4 karakter olsun.");
        return;
      }

      if (yeni !== tekrar) {
        alert("Yeni şifreler aynı değil.");
        return;
      }

      localStorage.setItem("grossmut_sifre", yeni);
      alert("Şifre değiştirildi.");

      document.getElementById("eskiSifreInput").value = "";
      document.getElementById("yeniSifreInput").value = "";
      document.getElementById("tekrarSifreInput").value = "";
      document.getElementById("ayarPanel").style.display = "none";
    }

    function baslikGuncelle() {
      const baslik = document.getElementById("baslikInput").value.trim();
      document.getElementById("afisBaslik").innerText = baslik || "HAFTANIN YILDIZLARI";
    }

    function sadeceSayiTemizle(deger) {
      return String(deger).replace(/[^0-9]/g, "");
    }

    document.getElementById("eskiInput").addEventListener("input", function() {
      this.value = this.value.replace(/[^0-9]/g, "");
    });

    document.getElementById("yeniInput").addEventListener("input", function() {
      this.value = this.value.replace(/[^0-9]/g, "");
    });

    document.getElementById("basGun").addEventListener("input", function() {
      this.value = this.value.replace(/[^0-9]/g, "");
    });

    document.getElementById("bitGun").addEventListener("input", function() {
      this.value = this.value.replace(/[^0-9]/g, "");
    });

    document.getElementById("resimInput").addEventListener("change", function(e){
      const file = e.target.files[0];
      if (!file) {
        secilenResim = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = function(evt) {
        secilenResim = evt.target.result;
      };
      reader.readAsDataURL(file);
    });

    function urunEkle() {
      if (urunler.length >= 12) {
        alert("En fazla 12 ürün eklenebilir.");
        return;
      }

      const ad = document.getElementById("urunAdiInput").value.trim();
      const aciklama = document.getElementById("aciklamaInput").value.trim();
      const eski = sadeceSayiTemizle(document.getElementById("eskiInput").value.trim());
      const yeni = sadeceSayiTemizle(document.getElementById("yeniInput").value.trim());

      urunler.push({
        ad,
        aciklama,
        eski,
        yeni,
        resim: secilenResim
      });

      document.getElementById("urunAdiInput").value = "";
      document.getElementById("aciklamaInput").value = "";
      document.getElementById("eskiInput").value = "";
      document.getElementById("yeniInput").value = "";
      document.getElementById("resimInput").value = "";
      secilenResim = "";

      ciz();
    }

    function temizle() {
      urunler = [];
      ciz();
    }

    function ciz() {
      const grid = document.getElementById("grid");
      let html = "";

      for (let i = 0; i < 12; i++) {
        const u = urunler[i];
        html += `
          <div class="card">
            <div class="imgBox">${u && u.resim ? `<img src="${u.resim}" alt="">` : ``}</div>
            <div class="urunAdi">${u ? (u.ad || "") : ""}</div>
            <div class="aciklama">${u ? (u.aciklama || "") : ""}</div>
            <div class="eski">${u ? (u.eski || "") : ""}</div>
            <div class="yeni">${u ? (u.yeni || "") : ""}</div>
            <div class="indirim">İNDİRİM</div>
          </div>
        `;
      }

      grid.innerHTML = html;
    }

    ciz();
  </script>
</body>
</html>
