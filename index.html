<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grossmut</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#eceff1}

/* LOGIN */
#login{
position:fixed;inset:0;background:#111;color:#fff;
display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999
}
#login input{padding:12px;font-size:18px;border-radius:8px;border:none;text-align:center}
#login button{margin-top:10px;padding:10px 20px;background:green;color:#fff;border:none;border-radius:8px}

/* PANEL */
.panel{
background:#fff;padding:10px;display:flex;flex-wrap:wrap;gap:8px
}
.panel input{padding:8px;border-radius:6px;border:1px solid #ccc}
.panel button{padding:8px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}

/* A4 */
#afis{
width:794px;height:1123px;margin:auto;background:#fff;overflow:hidden
}

/* HEADER */
.header{
display:grid;
grid-template-columns:1.5fr 0.5fr 0.5fr;
align-items:center;
gap:10px;
padding:10px;
}

/* LOGO */
.logoSatir{font-size:70px;font-weight:900;font-style:italic}
.g1{color:#1ca42f}
.g2{color:#f5a300}
.g3{color:#f5a300}

/* BAŞLIK */
.altBaslik{
margin-top:6px;
font-size:24px;
font-weight:900;
border:none;
background:transparent;
outline:none;
}

/* 🔥 TARİH SÜPER KÜÇÜK */
.tarihKutu{
background:#49a63a;
color:#fff;
border-radius:14px;
padding:4px 6px;
width:100px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.tarihBaslik{
font-size:9px;
font-weight:800;
margin-bottom:2px;
}

.tarihSatir{
display:flex;
align-items:center;
justify-content:center;
gap:1px;
}

.tarihInputKucuk{
width:24px;
height:20px;
border:none;
border-radius:4px;
background:#fff;
text-align:center;
font-weight:900;
font-size:11px;
padding:0;
}

.tarihAyirici{
font-size:12px;
font-weight:900;
}

.tarihInputAy{
width:60px;
height:20px;
margin-top:2px;
border:none;
border-radius:4px;
background:#fff;
text-align:center;
font-weight:900;
font-size:10px;
padding:0;
}

/* QR */
.qr img{
width:120px;
height:120px;
object-fit:contain;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(4,1fr);
height:860px;
}

/* CARD */
.card{
border:1px solid #ddd;
padding:5px;
display:flex;
flex-direction:column;
position:relative;
text-align:center;
}

/* RESİM */
.imgBox{
height:90px;
margin-top:22px;
}
.imgBox img{
width:100%;
height:100%;
object-fit:contain;
}

/* TEXT */
.urunAdi{font-size:14px;font-weight:bold}
.aciklama{font-size:10px;color:#666}
.eski{color:red;text-decoration:line-through}
.yeni{color:green;font-size:26px;font-weight:bold}
.indirim{background:gold;padding:5px;margin-top:auto}

/* PRINT */
@media print{
.panel,#login{display:none}
}
</style>
</head>

<body>

<div id="login">
<h2>Şifre</h2>
<input type="password" id="sifre">
<button onclick="giris()">Giriş</button>
</div>

<div class="panel">
<input id="urunAdiInput" placeholder="Ürün">
<input id="aciklamaInput" placeholder="Açıklama">
<input id="eskiInput" type="number">
<input id="yeniInput" type="number">
<input type="file" id="resimInput">

<button onclick="urunEkle()">Ekle</button>
<button onclick="kaydet()">Kaydet</button>
<button onclick="window.print()">PDF</button>
</div>

<div id="afis">

<div class="header">

<div>
<div class="logoSatir">
<span class="g1">GRO</span><span class="g2">S</span><span class="g1">S</span><span class="g3">MUT</span>
</div>
<input id="baslikInput" class="altBaslik" value="HAFTANIN YILDIZLARI">
</div>

<div class="tarihKutu">
<div class="tarihBaslik">GEÇERLİ</div>
<div class="tarihSatir">
<input id="basGun" type="number" value="21">
<span class="tarihAyirici">-</span>
<input id="bitGun" type="number" value="24">
</div>
<input id="ayInput" value="NİSAN">
</div>

<div class="qr">
<img src="IMG_8553.jpeg">
</div>

</div>

<div class="grid" id="grid"></div>

</div>

<script>
const KAYIT="gm_kayit";
const AYAR="gm_ayar";

let urunler=[],resim="";

/* giriş */
function giris(){
if(sifre.value==="7433"){
login.style.display="none";
}
}

/* kaydet */
function kaydet(){
localStorage.setItem(KAYIT,JSON.stringify(urunler));
localStorage.setItem(AYAR,JSON.stringify({
baslik:baslikInput.value,
basGun:basGun.value,
bitGun:bitGun.value,
ay:ayInput.value
}));
alert("Kaydedildi");
}

/* yükle */
function yukle(){
let u=localStorage.getItem(KAYIT);
if(u) urunler=JSON.parse(u);

let a=localStorage.getItem(AYAR);
if(a){
a=JSON.parse(a);
baslikInput.value=a.baslik;
basGun.value=a.basGun;
bitGun.value=a.bitGun;
ayInput.value=a.ay;
}
}

/* resim */
resimInput.onchange=e=>{
let r=new FileReader();
r.onload=x=>resim=x.target.result;
r.readAsDataURL(e.target.files[0]);
};

/* ekle */
function urunEkle(){
urunler.push({
ad:urunAdiInput.value,
aciklama:aciklamaInput.value,
eski:eskiInput.value,
yeni:yeniInput.value,
resim:resim
});
ciz();
}

/* çiz */
function ciz(){
let html="";
for(let i=0;i<12;i++){
let u=urunler[i]||{};
html+=`
<div class="card">
<div class="imgBox">${u.resim?`<img src="${u.resim}">`:``}</div>
<div class="urunAdi">${u.ad||""}</div>
<div class="aciklama">${u.aciklama||""}</div>
<div class="eski">${u.eski||""}</div>
<div class="yeni">${u.yeni||""}</div>
<div class="indirim">İNDİRİM</div>
</div>`;
}
grid.innerHTML=html;
}

yukle();
ciz();
</script>

</body>
</html>
